<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Insurance Bill Tracker — Pleiades Strategy</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg:        #F7F5F1;
    --surface:   #ffffff;
    --border:    #D7D7D6;
    --primary:   #00005B;
    --primary-l: #C9DAEB;
    --text:      #0D0D0D;
    --muted:     #666666;
    --accent:    #6360F0;
    --link:      #0000FB;
    --sand:      #D7D7D6;
    --cat-1:     #00005B;
    --cat-2:     #6360F0;
    --cat-3:     #1411B8;
    --cat-4:     #8E0000;
    --radius:    6px;
    --shadow:    0 1px 3px rgba(0,0,30,.08), 0 1px 2px rgba(0,0,30,.05);
  }
  html, body { height: 100%; }
  body { font-family: inherit; background: var(--bg); color: var(--text); font-size: 14px; }
  a { color: var(--link); text-decoration: none; }
  a:hover { text-decoration: underline; }
  button { cursor: pointer; font: inherit; }

  /* App shell */
  .app { display: flex; height: 100vh; }

  /* Sidebar */
  .sidebar { width: 228px; min-width: 228px; background: var(--primary); display: flex; flex-direction: column; }
  .sidebar-logo { padding: 20px 16px 16px; color: #fff; font-size: 15px; font-weight: 700; line-height: 1.3; border-bottom: 1px solid rgba(255,255,255,.12); letter-spacing: .03em; }
  .sidebar-logo span { display: block; font-size: 11px; font-weight: 400; opacity: .6; margin-top: 4px; letter-spacing: .04em; text-transform: uppercase; }
  .sidebar nav { flex: 1; padding: 8px 0; }
  .nav-item { display: flex; align-items: center; gap: 10px; padding: 10px 16px; color: rgba(255,255,255,.75); cursor: pointer; font-size: 13px; border: none; background: none; width: 100%; text-align: left; transition: background .15s; font-family: inherit; font-weight: 500; }
  .nav-item:hover { background: rgba(255,255,255,.09); color: #fff; }
  .nav-item.active { background: rgba(99,96,240,.30); color: #fff; font-weight: 600; border-left: 3px solid var(--accent); }
  .nav-icon { font-size: 15px; width: 20px; text-align: center; }

  /* Main */
  .main { flex: 1; overflow: auto; display: flex; flex-direction: column; min-width: 0; }

  /* Topbar */
  .topbar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 13px 24px; display: flex; align-items: center; gap: 16px; position: sticky; top: 0; z-index: 10; box-shadow: 0 1px 4px rgba(0,0,30,.06); }
  .topbar h1 { font-size: 17px; font-weight: 600; letter-spacing: .03em; color: var(--primary); }
  .topbar .spacer { flex: 1; }
  .badge-db { font-size: 11px; padding: 3px 10px; border-radius: 20px; background: #dcfce7; color: #166534; font-weight: 600; letter-spacing: .02em; }
  .badge-db.err { background: #fee2e2; color: #991b1b; }

  /* Year toggle */
  .year-toggle { display: flex; gap: 2px; background: var(--sand); border-radius: 8px; padding: 3px; }
  .year-btn { padding: 4px 12px; border-radius: 6px; border: none; font: inherit; font-size: 12px; font-weight: 600; background: transparent; color: var(--muted); cursor: pointer; transition: all .15s; }
  .year-btn:hover { color: var(--primary); }
  .year-btn.active { background: var(--surface); color: var(--primary); box-shadow: 0 1px 3px rgba(0,0,30,.12); }

  .content { padding: 24px; flex: 1; }

  /* Cards */
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow); }
  .card-header { padding: 12px 16px; border-bottom: 1px solid var(--border); font-weight: 600; font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; }

  /* Stat grid */
  .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px,1fr)); gap: 16px; margin-bottom: 24px; }
  .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px 20px; box-shadow: var(--shadow); }
  .stat-label { font-size: 10px; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); margin-bottom: 6px; font-weight: 600; }
  .stat-value { font-size: 32px; font-weight: 700; color: var(--primary); }
  .stat-sub { font-size: 11px; color: var(--muted); margin-top: 2px; }

  /* Charts */
  .chart-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px; }
  .chart-grid .card { padding: 16px; }
  .chart-grid canvas { max-height: 240px; }
  .chart-full { margin-bottom: 24px; }
  .chart-full .card { padding: 16px; }
  .chart-full canvas { max-height: 280px; }

  /* Filters */
  .filters { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 16px; margin-bottom: 16px; box-shadow: var(--shadow); }
  .filters select, .filters input[type=text] { border: 1px solid var(--border); border-radius: 6px; padding: 6px 10px; font: inherit; color: var(--text); background: var(--bg); outline: none; }
  .filters select:focus, .filters input:focus { border-color: var(--primary); }
  .filters input[type=text] { min-width: 220px; }
  .btn { padding: 6px 14px; border-radius: 6px; border: none; font: inherit; font-size: 13px; font-weight: 500; transition: background .15s; }
  .btn-primary { background: var(--primary); color: #fff; }
  .btn-primary:hover { background: var(--cat-3); }
  .btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--text); }
  .btn-ghost:hover { background: var(--sand); }

  /* Table */
  .table-wrap { overflow-x: auto; border-radius: var(--radius); box-shadow: var(--shadow); background: var(--surface); border: 1px solid var(--border); }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead th { background: #f8fafc; padding: 10px 12px; text-align: left; font-weight: 600; color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: .04em; border-bottom: 1px solid var(--border); white-space: nowrap; }
  tbody tr { border-bottom: 1px solid var(--border); transition: background .1s; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: #f8fafc; cursor: pointer; }
  tbody td { padding: 9px 12px; vertical-align: middle; }
  .td-state { font-weight: 700; color: var(--primary); width: 44px; font-size: 15px; }
  .td-bill { font-weight: 600; white-space: nowrap; }
  .td-title { max-width: 340px; }
  .td-title span { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .td-date { white-space: nowrap; color: var(--muted); }

  /* Status badges */
  .status { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 600; white-space: nowrap; }
  .s-introduced  { background: #C9DAEB; color: #00005B; }
  .s-committee   { background: #e0dffe; color: #1411B8; }
  .s-crossedover { background: #c9c8fc; color: #00005B; }
  .s-passed      { background: #00005B; color: #ffffff; }
  .s-enacted     { background: #0D0D0D; color: #ffffff; }
  .s-dead        { background: #f5d0d0; color: #8E0000; }
  .s-vetoed      { background: #f0c0c0; color: #540000; }
  .s-other       { background: #D7D7D6; color: #666666; }

  /* Tags */
  .tag { display: inline-block; padding: 1px 7px; border-radius: 20px; font-size: 10px; font-weight: 600; background: var(--primary-l); color: var(--primary); margin: 1px; letter-spacing: .02em; }

  /* Pagination */
  .pagination { display: flex; align-items: center; gap: 8px; padding: 14px 0; justify-content: flex-end; font-size: 13px; color: var(--muted); }
  .pagination button { padding: 5px 11px; border-radius: 6px; border: 1px solid var(--border); background: var(--surface); color: var(--text); }
  .pagination button:disabled { opacity: .4; cursor: default; }
  .pagination button:not(:disabled):hover { background: var(--bg); }

  /* Detail */
  .detail-back { margin-bottom: 16px; }
  .detail-header { display: flex; gap: 20px; align-items: flex-start; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; margin-bottom: 16px; box-shadow: var(--shadow); }
  .detail-main { flex: 1; }
  .detail-title { font-size: 18px; font-weight: 700; margin-bottom: 8px; }
  .detail-meta { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; margin-bottom: 10px; }
  .detail-links { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 10px; }
  .detail-links a { font-size: 12px; padding: 5px 12px; border-radius: 6px; border: 1px solid var(--border); color: var(--link); }
  .detail-links a:hover { background: var(--primary-l); text-decoration: none; }
  .detail-side { min-width: 180px; display: flex; flex-direction: column; gap: 10px; }
  .detail-kv { font-size: 12px; }
  .detail-kv dt { color: var(--muted); font-weight: 500; margin-bottom: 2px; }
  .detail-kv dd { color: var(--text); font-weight: 600; }
  .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
  .detail-section { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow); }
  .detail-section .card-header { font-size: 12px; }
  .detail-section .inner { padding: 14px 16px; }
  .detail-full { margin-bottom: 16px; }
  .sponsor-item { padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
  .sponsor-item:last-child { border-bottom: none; }
  .sponsor-name { font-weight: 600; }
  .sponsor-meta { color: var(--muted); font-size: 11px; margin-top: 1px; }
  .hearing-item { padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
  .hearing-item:last-child { border-bottom: none; }
  .summary-text { line-height: 1.6; color: var(--text); font-size: 13px; }
  .leg-party-D { color: #1d4ed8; font-weight: 700; }
  .leg-party-R { color: #dc2626; font-weight: 700; }
  .leg-party-I { color: #6b7280; font-weight: 700; }

  /* Empty / loading */
  .empty { text-align: center; padding: 60px 20px; color: var(--muted); font-size: 14px; }
  .loading { text-align: center; padding: 40px; color: var(--muted); }
  .spinner { display: inline-block; width: 24px; height: 24px; border: 3px solid var(--border); border-top-color: var(--primary); border-radius: 50%; animation: spin .7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Category view */
  .cat-pills { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px; }
  .cat-pill { padding: 6px 14px; border-radius: 20px; border: 2px solid var(--border); background: var(--surface); color: var(--text); font-size: 12px; font-weight: 600; cursor: pointer; transition: all .15s; font-family: inherit; }
  .cat-pill:hover { border-color: var(--accent); color: var(--accent); }
  .cat-pill.active { background: var(--primary); color: #fff; border-color: var(--primary); }
  .cat-mini-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px,1fr)); gap: 12px; margin-bottom: 20px; }
  .cat-mini-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 16px; box-shadow: var(--shadow); }
  .cat-mini-label { font-size: 10px; text-transform: uppercase; letter-spacing: .07em; color: var(--muted); margin-bottom: 4px; font-weight: 600; }
  .cat-mini-val { font-size: 26px; font-weight: 700; color: var(--primary); }
  .cat-mini-sub { font-size: 11px; color: var(--muted); }

  /* Geography */
  .map-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; box-shadow: var(--shadow); margin-bottom: 20px; }
  .map-wrap svg { width: 100%; height: auto; }
  .map-legend { display: flex; gap: 16px; font-size: 11px; color: var(--muted); margin-top: 10px; align-items: center; flex-wrap: wrap; }
  .legend-swatch { width: 14px; height: 14px; border-radius: 3px; display: inline-block; margin-right: 4px; vertical-align: middle; }

  /* Responsive */
  @media (max-width: 900px) {
    .chart-grid { grid-template-columns: 1fr; }
    .detail-grid { grid-template-columns: 1fr; }
    .detail-header { flex-direction: column; }
  }
  @media (max-width: 640px) {
    .sidebar { width: 52px; min-width: 52px; }
    .sidebar-logo, .nav-item span:not(.nav-icon) { display: none; }
    .nav-item { justify-content: center; padding: 12px; }
  }
</style>
</head>
<body>

<div class="app">
  <aside class="sidebar">
    <div class="sidebar-logo">
      &#9679; Pleiades Strategy
      <span>Insurance Bill Tracker</span>
    </div>
    <nav>
      <button class="nav-item active" data-view="dashboard"   onclick="showView('dashboard')"><span class="nav-icon">&#128202;</span><span>Dashboard</span></button>
      <button class="nav-item"        data-view="bills"       onclick="showView('bills')"><span class="nav-icon">&#128203;</span><span>Bills</span></button>
      <button class="nav-item"        data-view="legislators" onclick="showView('legislators')"><span class="nav-icon">&#128100;</span><span>Legislators</span></button>
      <button class="nav-item"        data-view="hearings"    onclick="showView('hearings')"><span class="nav-icon">&#128197;</span><span>Hearings</span></button>
      <button class="nav-item"        data-view="categories"  onclick="showView('categories')"><span class="nav-icon">&#127991;&#65039;</span><span>By Category</span></button>
      <button class="nav-item"        data-view="geography"   onclick="showView('geography')"><span class="nav-icon">&#128506;</span><span>By Geography</span></button>
    </nav>
  </aside>

  <div class="main">
    <div class="topbar">
      <h1 id="page-title">Dashboard</h1>
      <div class="spacer"></div>
      <div class="year-toggle">
        <button class="year-btn active" data-year="all"  onclick="setYear('all')">All Years</button>
        <button class="year-btn"        data-year="2025" onclick="setYear('2025')">2025</button>
        <button class="year-btn"        data-year="2026" onclick="setYear('2026')">2026</button>
      </div>
      <span id="db-badge" class="badge-db">Connecting&hellip;</span>
    </div>
    <div class="content" id="content">
      <div class="loading"><div class="spinner"></div></div>
    </div>
  </div>
</div>

<script>
let STATIC = null;

async function loadStaticData() {
  if (STATIC) return;
  const r = await fetch('https://pleiades-strategy.github.io/insurance_billtracking/data.json');
  if (!r.ok) throw new Error('data.json not found');
  STATIC = await r.json();
}

async function api(path) {
  if (!STATIC) await loadStaticData();
  const url = new URL(path, 'http://x');
  const p = url.searchParams, route = url.pathname;
  if (route === '/api/summary')     return STATIC.summary;
  if (route === '/api/filters')     return staticFilters();
  if (route === '/api/legislators') return staticLegislators(p);
  if (route === '/api/hearings')    return { hearings: filteredHearings() };
  if (route === '/api/bills')       return staticBills(p);
  if (route === '/api/bill')        return staticBillDetail(p.get('id'));
  return {};
}

function staticFilters() {
  const bills = filteredBills();
  return {
    states:   [...new Set(bills.map(b => b.state).filter(Boolean))].sort(),
    statuses: [...new Set(bills.map(b => b.status).filter(Boolean))].sort(),
  };
}

function staticBills(p) {
  const state    = p.get('state')    || '';
  const status   = p.get('status')   || '';
  const category = p.get('category') || '';
  const search   = (p.get('search')  || '').toLowerCase();
  const limit    = parseInt(p.get('limit')  || '200');
  const offset   = parseInt(p.get('offset') || '0');
  let filtered = filteredBills().filter(b => {
    if (state    && b.state  !== state)  return false;
    if (status   && b.status !== status) return false;
    if (category && !(b.keyword_tags||'').includes(category)) return false;
    if (search   && !((b.title||'')+(b.bill_number||'')+(b.summary||'')).toLowerCase().includes(search)) return false;
    return true;
  });
  return { total: filtered.length, bills: filtered.slice(offset, offset + limit) };
}

function staticBillDetail(id) {
  const bill = STATIC.bills.find(b => b.bill_id === id);
  if (!bill) return { error: 'not found' };
  return { bill, sponsors: bill.sponsors || [], hearings: STATIC.hearings.filter(h => h.bill_id === id), actions: [] };
}

function staticLegislators(p) {
  const search = (p.get('search') || '').toLowerCase();
  const party  = p.get('party')   || '';
  let legs = STATIC.legislators.filter(l => {
    if (activeYear === 'all') return true;
    return filteredBills().some(b => (b.sponsors||[]).some(s => s.legislator_name === l.legislator_name));
  });
  if (search) legs = legs.filter(l => (l.legislator_name||'').toLowerCase().includes(search));
  if (party)  legs = legs.filter(l => l.legislator_party === party);
  return { legislators: legs };
}

const CAT_LABELS = {
  state_insurance_residual_markets:         'State Insurance & Residual Markets',
  fortification_programs:                   'Fortification Programs',
  non_admitted_market:                      'Non-Admitted Market',
  consumer_protections_and_market_conduct:  'Consumer Protections & Market Conduct',
  catastrophe_modeling:                     'Catastrophe Modeling',
  data_and_study:                           'Data & Study',
  fossil_fuel_accountability:               'Fossil Fuel Accountability',
  state_insurance_office_regulatory_powers: 'State Insurance Office / Regulatory Powers',
  property_disclosure:                      'Property Disclosure',
  building_codes_land_use:                  'Building Codes / Land Use',
  climate_resilience_and_risk_mitigation:   'Climate Resilience & Risk Mitigation',
  reinsurance:                              'Reinsurance',
  litigation_and_tort_reform:               'Litigation & Tort Reform',
  rate_regulation:                          'Rate Regulation',
  climate_risk_disclosure:                  'Climate Risk Disclosure',
  anti_esg:                                 'Anti-ESG',
};
function catLabel(k) { return CAT_LABELS[k] || k.replace(/_/g,' ').replace(/\b\w/g, c => c.toUpperCase()); }

const STATUS_CLASS = {
  'Introduced':'s-introduced','In Committee':'s-committee','Crossed Over':'s-crossedover',
  'Passed':'s-passed','Signed/Enacted/Adopted':'s-enacted','Dead':'s-dead','Vetoed':'s-vetoed',
};
function statusBadge(s) { return `<span class="status ${STATUS_CLASS[s]||'s-other'}">${s||'&mdash;'}</span>`; }

// Year filter
let activeYear = 'all';
function filteredBills() {
  if (!STATIC) return [];
  if (activeYear === 'all') return STATIC.bills;
  return STATIC.bills.filter(b => { try { return JSON.parse(b.year||'[]').includes(activeYear); } catch { return false; } });
}
function filteredHearings() {
  if (!STATIC) return [];
  if (activeYear === 'all') return STATIC.hearings;
  const ids = new Set(filteredBills().map(b => b.bill_id));
  return STATIC.hearings.filter(h => ids.has(h.bill_id));
}
function setYear(yr) {
  activeYear = yr;
  filterCache = null;
  document.querySelectorAll('.year-btn').forEach(b => b.classList.toggle('active', b.dataset.year === yr));
  destroyCharts();
  document.getElementById('content').innerHTML = '<div class="loading"><div class="spinner"></div></div>';
  reRenderCurrent();
}

// App state
let currentView  = 'dashboard';
let billsState   = { page: 0, perPage: 50, total: 0, filters: {} };
let filterCache  = null;
let chartInstances = {};
let activeCats   = new Set();
let selectedState = null;

function destroyCharts() { Object.values(chartInstances).forEach(c => c.destroy()); chartInstances = {}; }

const VIEW_TITLES = { dashboard:'Dashboard', bills:'Bills', legislators:'Legislators', hearings:'Hearings', detail:'Bill Detail', categories:'By Category', geography:'By Geography' };

function reRenderCurrent() {
  if      (currentView==='dashboard')   renderDashboard();
  else if (currentView==='bills')       renderBills();
  else if (currentView==='legislators') renderLegislators();
  else if (currentView==='hearings')    renderHearings();
  else if (currentView==='categories')  renderCategories();
  else if (currentView==='geography')   renderGeography();
}

function showView(view, extra) {
  currentView = view;
  document.querySelectorAll('.nav-item').forEach(el => el.classList.toggle('active', el.dataset.view === view));
  document.getElementById('page-title').textContent = VIEW_TITLES[view] || view;
  destroyCharts();
  document.getElementById('content').innerHTML = '<div class="loading"><div class="spinner"></div></div>';
  if      (view==='dashboard')   renderDashboard();
  else if (view==='bills')       renderBills();
  else if (view==='legislators') renderLegislators();
  else if (view==='hearings')    renderHearings();
  else if (view==='categories')  renderCategories();
  else if (view==='geography')   renderGeography();
  else if (view==='detail')      renderDetail(extra);
}

async function checkDB() {
  const badge = document.getElementById('db-badge');
  try {
    await loadStaticData();
    const d = STATIC.summary;
    badge.textContent = `\u25cf ${d.total} bills \u00b7 ${d.states} states`;
    badge.className = 'badge-db';
  } catch {
    badge.textContent = '\u25cf Data unavailable';
    badge.className = 'badge-db err';
  }
}

// ── DASHBOARD ────────────────────────────────────────────────────────────────
async function renderDashboard() {
  if (!STATIC) await loadStaticData();
  const bills   = filteredBills();
  const total   = bills.length;
  const states  = new Set(bills.map(b=>b.state).filter(Boolean)).size;
  const active  = bills.filter(b=>['Introduced','In Committee','Crossed Over','Passed'].includes(b.status)).length;
  const enacted = bills.filter(b=>b.status==='Signed/Enacted/Adopted').length;
  const dead    = bills.filter(b=>b.status==='Dead').length;
  const statusCount={}, stateCount={}, catCount={};
  bills.forEach(b=>{
    const s=b.status||'Unknown'; statusCount[s]=(statusCount[s]||0)+1;
    if(b.state) stateCount[b.state]=(stateCount[b.state]||0)+1;
    try{JSON.parse(b.keyword_tags||'[]').forEach(t=>{catCount[t]=(catCount[t]||0)+1;});}catch{}
  });
  const topStates=Object.entries(stateCount).sort((a,b)=>b[1]-a[1]).slice(0,15);
  const catData=Object.entries(catCount).sort((a,b)=>b[1]-a[1]);
  const sColors={'Introduced':'#C9DAEB','In Committee':'#6360F0','Crossed Over':'#1411B8','Passed':'#00005B','Signed/Enacted/Adopted':'#0D0D0D','Dead':'#8E0000','Vetoed':'#540000'};

  document.getElementById('content').innerHTML = `
    <div class="stat-grid">

// ── BILLS ────────────────────────────────────────────────────────────────────
async function renderBills(reset=true) {
  if(reset){billsState.page=0;billsState.filters={};filterCache=null;}
  if(!filterCache) filterCache=await api('/api/filters');
  const f=billsState.filters;
  const params=new URLSearchParams({limit:billsState.perPage,offset:billsState.page*billsState.perPage,...(f.state?{state:f.state}:{}),...(f.status?{status:f.status}:{}),...(f.category?{category:f.category}:{}),...(f.search?{search:f.search}:{})});
  const data=await api('/api/bills?'+params);
  billsState.total=data.total;
  const catOptions=Object.keys(CAT_LABELS).map(k=>`<option value="${k}" ${f.category===k?'selected':''}>${catLabel(k)}</option>`).join('');
  const stateOptions=filterCache.states.map(s=>`<option value="${s}" ${f.state===s?'selected':''}>${s}</option>`).join('');
  const statusOptions=filterCache.statuses.map(s=>`<option value="${s}" ${f.status===s?'selected':''}>${s}</option>`).join('');
  const totalPages=Math.ceil(data.total/billsState.perPage), page=billsState.page;
  let rows='';
  for(const b of data.bills){
    let tags='';try{tags=JSON.parse(b.keyword_tags||'[]').slice(0,3).map(k=>`<span class="tag">${catLabel(k)}</span>`).join('');}catch{}
    rows+=`<tr onclick="showView('detail','${b.bill_id}')"><td class="td-state">${b.state||'&mdash;'}</td><td class="td-bill">${b.bill_number||'&mdash;'}</td><td class="td-title"><span title="${(b.title||'').replace(/"/g,'&quot;')}">${b.title||'&mdash;'}</span></td><td>${statusBadge(b.status)}</td><td class="td-date">${(b.last_action_date||'').slice(0,10)||'&mdash;'}</td><td>${tags}</td></tr>`;
  }
  if(!rows) rows='<tr><td colspan="6" class="empty">No bills match your filters.</td></tr>';
  document.getElementById('content').innerHTML=`
    <div class="filters">
      <input type="text" id="f-search" placeholder="Search title, bill number, summary&hellip;" value="${f.search||''}" onkeydown="if(event.key==='Enter')applyBillFilters()">
      <select id="f-state" onchange="applyBillFilters()"><option value="">All States</option>${stateOptions}</select>
      <select id="f-status" onchange="applyBillFilters()"><option value="">All Statuses</option>${statusOptions}</select>
      <select id="f-category" onchange="applyBillFilters()"><option value="">All Categories</option>${catOptions}</select>
      <button class="btn btn-primary" onclick="applyBillFilters()">Filter</button>
      <button class="btn btn-ghost" onclick="clearBillFilters()">Clear</button>
      <span style="margin-left:auto;color:var(--muted);font-size:12px">${data.total.toLocaleString()} bills</span>
    </div>
    <div class="table-wrap"><table>
      <thead><tr><th>State</th><th>Bill</th><th>Title</th><th>Status</th><th>Last Action</th><th>Categories</th></tr></thead>
      <tbody id="bills-body">${rows}</tbody>
    </table></div>
    <div class="pagination">
      <span>Page ${page+1} of ${Math.max(1,totalPages)}</span>
      <button onclick="billPage(-1)" ${page===0?'disabled':''}>&#8592; Prev</button>
      <button onclick="billPage(1)" ${page>=totalPages-1?'disabled':''}>Next &#8594;</button>
    </div>`;
}
function applyBillFilters(){billsState.filters={search:document.getElementById('f-search')?.value.trim()||'',state:document.getElementById('f-state')?.value||'',status:document.getElementById('f-status')?.value||'',category:document.getElementById('f-category')?.value||''};billsState.page=0;renderBills(false);}
function clearBillFilters(){billsState.filters={};billsState.page=0;renderBills(false);}
function billPage(dir){billsState.page=Math.max(0,billsState.page+dir);renderBills(false);}

    </div>

  const sColors={'Introduced':'#C9DAEB','In Committee':'#6360F0','Crossed Over':'#1411B8','Passed':'#00005B','Signed/Enacted/Adopted':'#0D0D0D','Dead':'#8E0000','Vetoed':'#540000'};

const STATE_GRID={AK:[1,8],HI:[2,8],WA:[1,1],ID:[2,2],MT:[3,1],ND:[4,1],MN:[5,1],WI:[6,2],MI:[7,2],NY:[9,2],VT:[10,1],ME:[11,1],OR:[1,2],NV:[2,3],WY:[3,2],SD:[4,2],IA:[5,2],IL:[6,3],IN:[7,3],OH:[8,3],PA:[9,3],NH:[10,2],MA:[11,2],CA:[1,3],UT:[2,4],CO:[3,3],NE:[4,3],MO:[5,3],KY:[6,4],WV:[7,4],VA:[8,4],MD:[9,4],NJ:[10,3],CT:[11,3],RI:[12,3],AZ:[2,5],NM:[3,4],KS:[4,4],AR:[5,4],TN:[6,5],NC:[7,5],SC:[8,5],DC:[9,5],DE:[10,4],OK:[4,5],LA:[5,5],MS:[6,6],AL:[7,6],GA:[8,6],TX:[4,6],FL:[8,7]};

async function renderGeography(){
  if(!STATIC) await loadStaticData();
  const stateMap={};
  filteredBills().forEach(b=>{if(!b.state)return;if(!stateMap[b.state])stateMap[b.state]=[];stateMap[b.state].push(b);});
  const maxCount=Math.max(...Object.values(stateMap).map(a=>a.length),1);
  function tileColor(abbr){if(abbr===selectedState)return '#6360F0';const c=stateMap[abbr]?.length||0;if(c===0)return '#D7D7D6';const t=Math.min(c/maxCount,1);return t>.66?'#00005B':t>.33?'#6360F0':'#C9DAEB';}
  function textColor(abbr){if(abbr===selectedState)return '#fff';const c=stateMap[abbr]?.length||0;if(c===0)return '#666666';return(c/maxCount)>0.33?'#fff':'#00005B';}
  const TILE=62,GAP=4,cols=12,rows=8,gridW=cols*(TILE+GAP),gridH=rows*(TILE+GAP);
  let tiles='';
  for(const [abbr,[col,row]] of Object.entries(STATE_GRID)){
    const x=(col-1)*(TILE+GAP),y=(row-1)*(TILE+GAP),count=stateMap[abbr]?.length||0;
    tiles+=`<g onclick="selectState('${abbr}')" style="cursor:pointer"><rect x="${x}" y="${y}" width="${TILE}" height="${TILE}" rx="6" fill="${tileColor(abbr)}" stroke="#fff" stroke-width="2"/><text x="${x+TILE/2}" y="${y+TILE/2-6}" text-anchor="middle" dominant-baseline="middle" font-size="11" font-weight="700" font-family="inherit" fill="${textColor(abbr)}">${abbr}</text><text x="${x+TILE/2}" y="${y+TILE/2+10}" text-anchor="middle" dominant-baseline="middle" font-size="10" font-family="inherit" fill="${textColor(abbr)}" opacity="0.85">${count>0?count:''}</text></g>`;
  }
  const statePanelHtml=selectedState?buildStatePanel(selectedState,stateMap[selectedState]||[]):'<div style="color:var(--muted);font-size:13px;padding:20px 0;text-align:center">Click a state to see its bills and charts.</div>';
  document.getElementById('content').innerHTML=`
    <div class="map-wrap"><svg viewBox="-4 -4 ${gridW+8} ${gridH+8}" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:auto">${tiles}</svg>
      <div class="map-legend">
        <span><span class="legend-swatch" style="background:#D7D7D6;border:1px solid #ccc"></span>No bills</span>
        <span><span class="legend-swatch" style="background:#C9DAEB"></span>Fewer bills</span>
        <span><span class="legend-swatch" style="background:#6360F0"></span>More bills</span>
        <span><span class="legend-swatch" style="background:#00005B"></span>Most bills</span>
        <span style="margin-left:auto;color:var(--muted)">${Object.keys(stateMap).length} states with bills</span>
      </div>
    </div>
    <div id="geo-state-panel">${statePanelHtml}</div>`;
  if(selectedState) renderStateCharts(selectedState,stateMap[selectedState]||[]);
}

function buildStatePanel(abbr,bills){
  const active=bills.filter(b=>['Introduced','In Committee','Crossed Over','Passed'].includes(b.status)).length,
        enacted=bills.filter(b=>b.status==='Signed/Enacted/Adopted').length,
        dead=bills.filter(b=>b.status==='Dead').length;
  const billRows=bills.map(b=>{let tags='';try{tags=JSON.parse(b.keyword_tags||'[]').slice(0,2).map(k=>`<span class="tag">${catLabel(k)}</span>`).join('');}catch{}return `<tr onclick="showView('detail','${b.bill_id}')"><td class="td-bill">${b.bill_number||'&mdash;'}</td><td class="td-title"><span>${b.title||'&mdash;'}</span></td><td>${statusBadge(b.status)}</td><td class="td-date">${(b.last_action_date||'').slice(0,10)||'&mdash;'}</td><td>${tags}</td></tr>`;}).join('')||'<tr><td colspan="5" class="empty">No bills for this state.</td></tr>';
  return `
    <div style="font-size:20px;font-weight:700;color:var(--primary);margin-bottom:14px;padding-bottom:10px;border-bottom:2px solid var(--border)">${abbr} &mdash; ${bills.length} Bill${bills.length!==1?'s':''}</div>
    <div class="cat-mini-grid" style="margin-bottom:18px">
      <div class="cat-mini-card"><div class="cat-mini-label">Total</div><div class="cat-mini-val">${bills.length}</div></div>
      <div class="cat-mini-card"><div class="cat-mini-label">Active</div><div class="cat-mini-val" style="color:#1411B8">${active}</div></div>
      <div class="cat-mini-card"><div class="cat-mini-label">Enacted</div><div class="cat-mini-val" style="color:#00005B">${enacted}</div></div>
      <div class="cat-mini-card"><div class="cat-mini-label">Dead</div><div class="cat-mini-val" style="color:#8E0000">${dead}</div></div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:24px">
      <div class="card" style="padding:16px"><div class="card-header">Bills by Status</div><canvas id="geo-chart-status" style="max-height:220px"></canvas></div>
      <div class="card" style="padding:16px"><div class="card-header">Bills by Category</div><canvas id="geo-chart-cats" style="max-height:220px"></canvas></div>
    </div>
    <div class="card-header" style="margin-bottom:8px">All Bills</div>
    <div class="table-wrap"><table><thead><tr><th>Bill</th><th>Title</th><th>Status</th><th>Last Action</th><th>Categories</th></tr></thead><tbody>${billRows}</tbody></table></div>`;
}

function renderStateCharts(abbr,bills){
  const sColors={'Introduced':'#C9DAEB','In Committee':'#6360F0','Crossed Over':'#1411B8','Passed':'#00005B','Signed/Enacted/Adopted':'#0D0D0D','Dead':'#8E0000','Vetoed':'#540000'},catPalette=['#00005B','#6360F0','#1411B8','#8E0000'];
  const statusCount={};bills.forEach(b=>{const s=b.status||'Unknown';statusCount[s]=(statusCount[s]||0)+1;});
  const sLabels=Object.keys(statusCount), sc=document.getElementById('geo-chart-status');
  if(sc) chartInstances['geo-status']=new Chart(sc,{type:'doughnut',data:{labels:sLabels,datasets:[{data:sLabels.map(l=>statusCount[l]),backgroundColor:sLabels.map(l=>sColors[l]||'#D7D7D6'),borderWidth:2,borderColor:'#fff'}]},options:{plugins:{legend:{position:'right',labels:{boxWidth:10,font:{size:10}}}},cutout:'55%',maintainAspectRatio:true}});
  const catCount={};bills.forEach(b=>{try{JSON.parse(b.keyword_tags||'[]').forEach(t=>{catCount[t]=(catCount[t]||0)+1;});}catch{}});
  const catData=Object.entries(catCount).sort((a,b)=>b[1]-a[1]), cc=document.getElementById('geo-chart-cats');
  if(cc&&catData.length) chartInstances['geo-cats']=new Chart(cc,{type:'bar',data:{labels:catData.map(d=>catLabel(d[0])),datasets:[{data:catData.map(d=>d[1]),backgroundColor:catData.map((_,i)=>catPalette[i%catPalette.length]),borderRadius:4}]},options:{plugins:{legend:{display:false}},scales:{x:{ticks:{maxRotation:35,font:{size:9}},grid:{display:false}},y:{grid:{color:'#D7D7D6'},ticks:{font:{size:10}}}},maintainAspectRatio:true}});
}

function selectState(abbr){selectedState=selectedState===abbr?null:abbr;destroyCharts();renderGeography();}

// Init
checkDB();
showView('dashboard');
</script>
</body>
</html>
