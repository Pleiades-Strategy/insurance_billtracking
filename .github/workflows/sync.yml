name: Sync Airtable Data

on:
  schedule:
    # Runs daily at 9:00 AM UTC (5 AM ET / 2 AM PT)
    - cron: "0 9 * * *"
  workflow_dispatch: # Allow manual runs from the Actions tab

jobs:
  sync:
    runs-on: ubuntu-latest

    permissions:
      contents: write # needed to push data.json back to the repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Fetch data from Airtable and write data.json
        env:
          AIRTABLE_KEY: ${{ secrets.AIRTABLE_KEY }}
          AIRTABLE_BASE_ID: ${{ secrets.AIRTABLE_BASE_ID }}
        run: python sync.py

      - name: Commit and push data.json (if changed)
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data.json
          git diff --staged --quiet \
            && echo "No changes — data.json is already up to date." \
            || git commit -m "chore: sync data from Airtable [skip ci]" && git push
